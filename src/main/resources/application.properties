# Server Configuration
server.port=${PORT:8080}

# Application Name
spring.application.name=projeto-backend

# Database Configuration
# Railway provides DATABASE_URL automatically
# For local development, set SPRING_DATASOURCE_* variables
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt-secret=GabrielPortfolioSecretKey2024VerySecureAndLongKeyForJWTSigning
app.jwt-expiration=86400000

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Actuator for health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging (temporary para debug)
logging.level.com.projeto=DEBUG
logging.level.org.springframework.security=DEBUG
