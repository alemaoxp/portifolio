<script type="module">
    import { authManager } from './js/modules/auth.js';
    import { projectRepo } from './js/modules/projects.js';
    import { contactManager } from './js/modules/contacts.js';
    import { formatDate } from './js/utils/ui.js';

    async function init() {
        // Carrega token do localStorage
        await authManager.init();

        // Se nao tiver token, redireciona para login
        if (!authManager.getToken()) {
            window.location.href = 'login.html';
            return;
        }

        // Mostra email do usuário logado
        if (authManager.currentUser) {
            const emailEl = document.getElementById('user-email');
            if (emailEl) emailEl.textContent = authManager.currentUser.email;
        }

        // Logout
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                authManager.logout();
            });
        }

        await loadDashboard();
    }

    async function loadDashboard() {
        // Projetos da API
        try {
            const projects = await projectRepo.list();
            if (projects.success) {
                document.getElementById('stat-projects').textContent = projects.data.length;
            }
        } catch (err) {
            console.warn('Erro ao carregar projetos:', err);
        }

        // Mensagens da API
        try {
            const messages = await contactManager.listMessages();
            if (messages.success && messages.data) {
                document.getElementById('stat-messages').textContent =
                    messages.data.filter(m => m.status === 'novo' || m.status === 'new').length;

                const tbody = document.querySelector('#messages-table tbody');
                tbody.innerHTML = messages.data.slice(0, 5).map(msg => {
                    const mensagem = msg.mensagem || msg.message || '';
                    const nome = msg.nome || msg.name || 'Anônimo';
                    const email = msg.email || '';
                    const status = msg.status || 'novo';
                    const criadoEm = msg.criadoEm || msg.created_at;
                    const displayMsg = mensagem.length > 50 ? mensagem.substring(0, 50) + '...' : mensagem;

                    return `
                    <tr>
                        <td>${nome}</td>
                        <td>${email}</td>
                        <td>${displayMsg}</td>
                        <td>
                            <span class="status-badge status-${status}">
                                ${status}
                            </span>
                        </td>
                        <td>${formatDate(criadoEm)}</td>
                    </tr>
                `}).join('');
            }
        } catch (err) {
            console.warn('Erro ao carregar mensagens:', err);
        }

        // Visitas - placeholder (analytics depende do Supabase)
        try {
            document.getElementById('stat-visits').textContent = '--';
        } catch (err) {
            // ignora se elemento nao existir
        }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        await init();

        // Mobile menu toggle
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const sidebar = document.getElementById('admin-sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        if (mobileMenuBtn && sidebar && overlay) {
            mobileMenuBtn.addEventListener('click', () => {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('show');
            });

            overlay.addEventListener('click', () => {
                sidebar.classList.remove('open');
                overlay.classList.remove('show');
            });
        }
    });
</script>
