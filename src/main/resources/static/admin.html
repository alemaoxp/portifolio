<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Painel Administrativo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">

    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }

        .admin-sidebar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 2rem 0;
        }

        .admin-sidebar .logo {
            padding: 0 1.5rem;
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-primary);
        }

        .admin-nav a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
        }

        .admin-nav a:hover, .admin-nav a.active {
            background: rgba(59, 130, 246, 0.1);
            color: var(--color-primary);
        }

        .admin-nav a i {
            width: 20px;
            text-align: center;
        }

        .admin-content {
            padding: 2rem;
            background: var(--color-bg-dark);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .admin-header h1 {
            color: var(--text-primary);
            font-size: 1.75rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            text-align: center;
        }

        .stat-card i {
            font-size: 2rem;
            color: var(--color-primary);
            margin-bottom: 0.5rem;
        }

        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-card .stat-label {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .chart-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .table-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .table-container h3 {
            padding: 1.5rem;
            color: var(--text-primary);
            border-bottom: 1px solid var(--glass-border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th, table td {
            padding: 1rem 1.5rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        table th {
            background: rgba(59, 130, 246, 0.05);
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.875rem;
        }

        table td {
            color: var(--text-primary);
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-new {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        /* Responsividade - Admin */
        @media (max-width: 968px) {
            .admin-layout {
                grid-template-columns: 1fr;
            }

            .admin-sidebar {
                position: fixed;
                left: -260px;
                top: 0;
                bottom: 0;
                width: 250px;
                z-index: 1000;
                transition: left var(--transition-normal);
                box-shadow: var(--shadow-lg);
            }

            .admin-sidebar.open {
                left: 0;
            }

            .admin-content {
                padding: 1.5rem;
            }

            .mobile-menu-btn {
                display: flex;
            }

            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
        }

        @media (max-width: 640px) {
            .admin-header {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-sm);
            }

            .admin-header h1 {
                font-size: 1.5rem;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: var(--space-md);
            }

            .stat-card {
                padding: 1rem;
            }

            .stat-card .stat-value {
                font-size: 1.5rem;
            }

            .stat-card .stat-label {
                font-size: 0.75rem;
            }

            .chart-container {
                padding: 1rem;
            }

            .table-container {
                overflow-x: auto;
            }

            table {
                min-width: 600px;
            }

            table th, table td {
                padding: 0.75rem 1rem;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 480px) {
            .admin-content {
                padding: 1rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .stat-card {
                padding: 0.875rem;
            }

            .stat-card .stat-value {
                font-size: 1.25rem;
            }
        }

        /* Botão menu mobile */
        .mobile-menu-btn {
            display: none;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.25rem;
            cursor: pointer;
        }

        /* Overlay para sidebar mobile */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .sidebar-overlay.show {
            display: block;
        }
    </style>
</head>
<body>
<div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar" id="admin-sidebar">
        <div class="logo">&lt;Gabriel/&gt; Admin</div>
        <nav class="admin-nav">
            <a href="#" class="active">
                <i class="fas fa-chart-line"></i> Dashboard
            </a>
            <a href="projetos.html">
                <i class="fas fa-folder"></i> Projetos
            </a>
            <a href="#">
                <i class="fas fa-envelope"></i> Contatos
            </a>
            <a href="index.html">
                <i class="fas fa-globe"></i> Ver Site
            </a>
            <a href="#" id="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Sair
            </a>
        </nav>
    </aside>

    <!-- Overlay para mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Content -->
    <main class="admin-content">
        <div class="admin-header">
            <button class="mobile-menu-btn" id="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </button>
            <h1><i class="fas fa-chart-line"></i> Dashboard</h1>
            <span id="user-email" style="color: var(--text-muted);"></span>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-eye"></i>
                <div class="stat-value" id="stat-visits">0</div>
                <div class="stat-label">Visitas Totais</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-folder"></i>
                <div class="stat-value" id="stat-projects">0</div>
                <div class="stat-label">Projetos</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-envelope"></i>
                <div class="stat-value" id="stat-messages">0</div>
                <div class="stat-label">Mensagens Novas</div>
            </div>
        </div>

        <!-- Chart -->
        <div class="chart-container">
            <h3 style="margin-bottom: 1rem;">Visitas Recentes</h3>
            <canvas id="visitsChart"></canvas>
        </div>

        <!-- Messages Table -->
        <div class="table-container">
            <h3><i class="fas fa-inbox"></i> Mensagens Recentes</h3>
            <div id="messages-table">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Email</th>
                            <th>Mensagem</th>
                            <th>Status</th>
                            <th>Data</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="5" style="text-align: center; color: var(--text-muted);">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { authManager } from './js/modules/auth.js';
    import { projectRepo } from './js/modules/projects.js';
    import { contactManager } from './js/modules/contacts.js';
    import { formatDate } from './js/utils/ui.js';

    async function init() {
        // Protege página - carrega token do localStorage se existir
        await authManager.init();

        const isAuth = await authManager.requireAuth();
        if (!isAuth) return;

        // Mostra email do usuário logado
        if (authManager.currentUser) {
            const emailEl = document.getElementById('user-email');
            if (emailEl) emailEl.textContent = authManager.currentUser.email;
        }

        // Logout
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                authManager.logout();
            });
        }

        await loadDashboard();
    }

    async function loadDashboard() {
        const stats = await analytics.getDashboardStats();
        if (stats.success) {
            document.getElementById('stat-visits').textContent = stats.data.totalVisits;

            const ctx = document.getElementById('visitsChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: stats.data.dailyVisits.map(d => d.date.slice(5)),
                    datasets: [{
                        label: 'Visitas',
                        data: stats.data.dailyVisits.map(d => d.count),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                }
            });
        }

        const projects = await projectRepo.list();
        if (projects.success) {
            document.getElementById('stat-projects').textContent = projects.data.length;
        }

        const messages = await contactManager.listMessages();
        console.log("📨 MESSAGES:", messages);

        if (messages.success) {
            document.getElementById('stat-messages').textContent =
                messages.data.filter(m => m.status === 'novo' || m.status === 'new').length;

            const tbody = document.querySelector('#messages-table tbody');
            tbody.innerHTML = messages.data.slice(0, 5).map(msg => {
                const mensagem = msg.mensagem || msg.message || '';
                const nome = msg.nome || msg.name || 'Anônimo';
                const email = msg.email || '';
                const status = msg.status || 'novo';
                const criadoEm = msg.criadoEm || msg.created_at;
                const displayMsg = mensagem.length > 50 ? mensagem.substring(0, 50) + '...' : mensagem;
                
                return `
                <tr>
                    <td>${nome}</td>
                    <td>${email}</td>
                    <td>${displayMsg}</td>
                    <td>
                        <span class="status-badge status-${status}">
                            ${status}
                        </span>
                    </td>
                    <td>${formatDate(criadoEm)}</td>
                </tr>
            `}).join('');
        }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        await init();

        // Mobile menu toggle
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const sidebar = document.getElementById('admin-sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        if (mobileMenuBtn && sidebar && overlay) {
            mobileMenuBtn.addEventListener('click', () => {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('show');
            });

            overlay.addEventListener('click', () => {
                sidebar.classList.remove('open');
                overlay.classList.remove('show');
            });

            // Fecha sidebar ao clicar em um link
            sidebar.querySelectorAll('.admin-nav a').forEach(link => {
                link.addEventListener('click', () => {
                    if (window.innerWidth <= 968) {
                        sidebar.classList.remove('open');
                        overlay.classList.remove('show');
                    }
                });
            });
        }
    });
</script>
</body>
</html>
