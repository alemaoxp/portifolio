<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Admin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-dark);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-2xl);
            padding: 2.5rem;
            box-shadow: var(--shadow-lg);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header i {
            font-size: 3rem;
            color: var(--color-primary);
            margin-bottom: 1rem;
        }

        .login-header h1 {
            color: var(--text-primary);
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-footer {
            text-align: center;
            margin-top: 1.5rem;
        }

        .form-footer a {
            color: var(--color-primary-light);
            font-size: 0.9rem;
        }

        /* Responsividade */
        @media (max-width: 640px) {
            .login-container {
                padding: 1.5rem;
            }

            .login-card {
                padding: 1.5rem;
            }

            .login-header i {
                font-size: 2.5rem;
            }

            .login-header h1 {
                font-size: 1.25rem;
            }

            .login-header p {
                font-size: 0.85rem;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 1rem;
            }

            .login-card {
                padding: 1.25rem;
            }

            .login-header i {
                font-size: 2rem;
            }

            .login-header h1 {
                font-size: 1.125rem;
            }

            .form-footer a {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-shield-alt"></i>
            <h1>Área Administrativa</h1>
            <p>Faça login para gerenciar o portfólio</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label">Email</label>
                <div style="position: relative;">
                    <i class="fas fa-envelope" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="email" name="email" class="form-input" style="padding-left: 2.5rem;" placeholder="admin@exemplo.com" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Senha</label>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="password" name="password" class="form-input" style="padding-left: 2.5rem;" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fas fa-sign-in-alt"></i> Entrar
            </button>
        </form>

        <div class="form-footer">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Voltar ao site</a>
        </div>
    </div>
</div>

<script type="module">
    import { authManager } from './js/modules/auth.js';
    import { showToast } from './js/utils/ui.js';

    // Se já estiver logado, redireciona
    authManager.redirectIfAuthenticated();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = new FormData(e.target);
        const btn = e.target.querySelector('button');

        btn.classList.add('loading');
        btn.innerHTML = '<span class="loading-spinner"></span> Entrando...';

        const result = await authManager.login(
            formData.get('email'),
            formData.get('password')
        );

        if (!result.success) {
            btn.classList.remove('loading');
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
        }
    });
</script>
</body>
</html>
